<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VIGIL — DFR Overwatch Console (live)</title>
<meta name="robots" content="noindex" />
<style>
  :root{
    --bg:#05070a; --panel:#0b1016; --panel-2:#0e141b; --ink:#F4F5F6; --muted:#9BA0A7; --faint:#83878E;
    --line:rgba(255,255,255,.12); --line-soft:rgba(255,255,255,.06);
    --accent:#A8B44C; --accent-soft:rgba(168,180,76,.1); --accent-line:rgba(168,180,76,.34);
    --ok:#7FBF8A; --alert:#EF8B78; --alert-2:#E5573F; --alert-line:rgba(229,87,63,.42); --steel:#6FA8C7;
    --sans:'Helvetica Neue',Helvetica,Arial,system-ui,sans-serif;
    --mono:ui-monospace,'Cascadia Mono','SF Mono','Segoe UI Mono',Consolas,monospace; --r:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0} html,body{overflow-x:clip}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;font-size:15px;
    -webkit-font-smoothing:antialiased;letter-spacing:-.006em}
  a{color:var(--accent)} button{font-family:inherit} .mono{font-family:var(--mono)}
  .wrap{max-width:1240px;margin:0 auto;padding:0 clamp(16px,3vw,32px)}
  header.bar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line-soft);
    background:rgba(5,7,10,.85);backdrop-filter:blur(14px)}
  .bar-in{display:flex;align-items:center;gap:16px;height:56px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px;letter-spacing:.16em}
  .brand i{font-style:normal;color:var(--accent);margin:0 4px} .brand svg{width:18px;height:21px}
  .bar-end{margin-left:auto;display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:11px;letter-spacing:.08em}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:100px;border:1px solid var(--line);
    font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .pill i{width:6px;height:6px;border-radius:50%;background:var(--faint)} .pill.on i{background:var(--ok)}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:9px 13px;border-radius:var(--r);
    border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;transition:.15s}
  .btn:hover:not([disabled]){border-color:var(--accent-line);background:var(--accent-soft)}
  .btn.primary{border-color:var(--accent-line);color:var(--accent)}
  .btn.auth{border-color:var(--accent);background:rgba(168,180,76,.12);color:var(--accent)}
  .btn.danger{border-color:var(--alert-line);color:var(--alert)}
  .btn[disabled]{opacity:.32;cursor:not-allowed}

  main{padding:22px 0 80px}
  /* auth gate */
  .gate{max-width:420px;margin:12vh auto;text-align:center;padding:0 20px}
  .gate h1{font-weight:200;font-size:34px;letter-spacing:-.03em;margin-bottom:8px} .gate h1 em{font-style:normal;color:var(--accent)}
  .gate p{color:var(--muted);font-size:14px;margin-bottom:22px}
  .gate input{width:100%;padding:13px 15px;border-radius:var(--r);border:1px solid var(--line);background:var(--panel);
    color:var(--ink);font-family:var(--mono);font-size:14px;margin-bottom:12px}
  .gate .btn{width:100%;justify-content:center;padding:13px}
  .note{font-size:12px;color:var(--faint);line-height:1.6;margin-top:18px}

  .grid{display:grid;grid-template-columns:1.55fr 1fr;gap:1px;border:1px solid var(--line);border-radius:10px;
    overflow:hidden;background:var(--line-soft)}
  .col{background:linear-gradient(180deg,#090d13,#070a0e);min-width:0}
  .col-head{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line-soft);
    font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .col-head .live{margin-left:auto;display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
  .col-head .live i{width:5px;height:5px;border-radius:50%;background:var(--faint)}
  .col-head.on .live{color:var(--accent)} .col-head.on .live i{background:var(--accent)}
  .opix{position:relative;aspect-ratio:16/10;background:#04070b;overflow:hidden;border-bottom:1px solid var(--line-soft)}
  .opix video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#04070b}
  .opix .hud{position:absolute;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--accent);z-index:3;text-transform:uppercase}
  .opix .hud.tl{top:11px;left:13px} .opix .hud.bl{bottom:11px;left:13px;color:rgba(244,245,246,.55)}
  .opix .veil{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;background:rgba(4,7,11,.72);text-align:center;padding:20px}
  .opix.live .veil{display:none} .veil .vt{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  .veil .vb{font-weight:300;font-size:19px;letter-spacing:-.02em;max-width:320px}
  .incident{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line-soft)}
  .icell{background:#080c12;padding:11px 14px} .icell .k{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .icell .v{font-size:13px;margin-top:4px;font-weight:500;font-variant-numeric:tabular-nums}
  .controls{display:flex;flex-wrap:wrap;gap:8px;padding:14px 16px}

  .gov{padding:14px 16px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--line-soft);font-size:12.5px}
  .gov .r{display:flex;gap:10px;align-items:center;color:var(--muted)} .gov .r b{color:var(--ink);font-weight:500}
  .gov .r .val{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)} .gov .r .val.ok{color:var(--ok)}
  .ledger{max-height:420px;overflow-y:auto;padding:4px 0}
  .lrow{display:grid;grid-template-columns:34px 60px 1fr 96px;gap:9px;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,.04);align-items:baseline}
  .lrow .s{font-family:var(--mono);font-size:10px;color:rgba(244,245,246,.4)}
  .lrow .t{font-family:var(--mono);font-size:10px;color:rgba(244,245,246,.5)}
  .lrow .e b{font-size:12.5px;font-weight:500} .lrow .e .m{display:block;font-size:11.5px;color:rgba(244,245,246,.5);margin-top:2px}
  .lrow .e .g{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;color:var(--accent);display:inline-block;margin-bottom:3px}
  .lrow .h{font-family:var(--mono);font-size:10px;color:var(--ok);text-align:right}
  .lrow.broken{background:rgba(229,87,63,.09)} .lrow.broken .h{color:var(--alert)}
  .empty{padding:24px 16px;font-family:var(--mono);font-size:11px;color:var(--faint);line-height:1.9}
  .verdict{padding:10px 16px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;border-top:1px solid var(--line-soft)}
  .verdict.ok{color:var(--ok)} .verdict.bad{color:var(--alert);background:rgba(229,87,63,.1)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--line);
    border-radius:var(--r);padding:11px 16px;font-size:13px;z-index:50;max-width:90vw;display:none}
  .toast.show{display:block} .toast.err{border-color:var(--alert-line);color:var(--alert)}
  .setup{max-width:640px;margin:10vh auto;padding:24px;border:1px solid var(--alert-line);border-radius:10px;background:rgba(229,87,63,.06)}
  .setup h2{font-weight:400;margin-bottom:10px} .setup code{font-family:var(--mono);color:var(--accent)}
  @media(max-width:860px){.grid{grid-template-columns:1fr}}
  @media(max-width:560px){.incident{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header class="bar"><div class="wrap bar-in">
  <span class="brand">
    <svg viewBox="0 0 24 27" aria-hidden="true"><path d="M12 1.4 21 4.6 V11.6 C21 17.4 17 22 12 24.4 C7 22 3 17.4 3 11.6 V4.6 Z" fill="none" stroke="#A8B44C" stroke-width="1.4"/><path d="M12 5.4 L13.3 11.4 L18.6 12.6 L13.3 13.8 L12 19.8 L10.7 13.8 L5.4 12.6 L10.7 11.4 Z" fill="#A8B44C"/></svg>
    <b>VIGIL</b><i>·</i>DFR OVERWATCH
  </span>
  <div class="bar-end">
    <span class="pill" id="feedPill"><i></i><span id="feedPillT">Feed offline</span></span>
    <span id="who" class="mono" style="color:var(--muted)"></span>
    <button class="btn" id="signout" style="display:none">Sign out</button>
  </div>
</div></header>

<main class="wrap" id="app"></main>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ==================== CONFIG — fill these in (see README) ==================== */
const CONFIG = {
  SUPABASE_URL:      'https://YOUR-PROJECT-ref.supabase.co',
  SUPABASE_ANON_KEY: 'YOUR-ANON-KEY',
  FEED_WHEP:         'http://localhost:8889/thermal/whep',   // MediaMTX WHEP endpoint
};
/* ============================================================================= */

const app = document.getElementById('app');
const toastEl = document.getElementById('toast');
const feedPill = document.getElementById('feedPill'), feedPillT = document.getElementById('feedPillT');
const whoEl = document.getElementById('who'), signoutBtn = document.getElementById('signout');

if (CONFIG.SUPABASE_URL.includes('YOUR-PROJECT')) {
  app.innerHTML = `<div class="setup"><h2>Setup needed</h2><p>Fill in <code>CONFIG.SUPABASE_URL</code>,
    <code>CONFIG.SUPABASE_ANON_KEY</code> and <code>CONFIG.FEED_WHEP</code> at the top of the
    <code>&lt;script&gt;</code> in <code>web/index.html</code>, then reload. See the README for the full
    setup (create the Supabase project, <code>db push</code>, deploy the functions, set
    <code>LEDGER_SECRET</code>, give yourself a <code>commander</code> role).</p></div>`;
  throw new Error('config');
}

const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
let profile = null, incident = null, verify = { sealed: true, brokenAt: null };

function toast(msg, err = false) { toastEl.textContent = msg; toastEl.className = 'toast show' + (err ? ' err' : ''); setTimeout(() => toastEl.className = 'toast', 3200); }
async function fn(name, body) {
  const { data, error } = await sb.functions.invoke(name, { body });
  if (error) { let m = error.message; try { m = (await error.context.json()).error || m; } catch (_) {} throw new Error(m); }
  if (data && data.error) throw new Error(data.error);
  return data;
}

/* ---- auth ---- */
signoutBtn.onclick = async () => { await sb.auth.signOut(); location.reload(); };
sb.auth.onAuthStateChange((_e, session) => render(session));
render((await sb.auth.getSession()).data.session);

async function render(session) {
  if (!session) { whoEl.textContent = ''; signoutBtn.style.display = 'none'; renderGate(); return; }
  const { data } = await sb.from('profiles').select('role, full_name').eq('id', session.user.id).single();
  profile = data || { role: 'viewer', full_name: session.user.email };
  whoEl.textContent = `${profile.role.toUpperCase()} · ${profile.full_name || session.user.email}`;
  signoutBtn.style.display = '';
  renderConsole();
}

function renderGate() {
  app.innerHTML = `<div class="gate">
    <h1>Vigil <em>overwatch</em></h1>
    <p>Sign in to the command console. A magic link is sent to your email.</p>
    <input id="email" type="email" placeholder="you@fire-service.gov.uk" autocomplete="email" />
    <button class="btn primary" id="send">Send magic link</button>
    <div class="note">Roles are assigned by an admin. A fresh sign-in is <b>viewer</b> until promoted
      to <b>commander</b>/<b>operator</b> (see README). This is a design concept — synthetic data only.</div>
  </div>`;
  document.getElementById('send').onclick = async () => {
    const email = document.getElementById('email').value.trim(); if (!email) return;
    const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: location.href } });
    toast(error ? error.message : 'Magic link sent — check your email.', !!error);
  };
}

/* ---- console ---- */
function renderConsole() {
  const canOpen = ['commander', 'admin'].includes(profile.role);
  const canWrite = ['operator', 'commander', 'admin'].includes(profile.role);
  app.innerHTML = `
  <div class="grid">
    <div class="col">
      <div class="col-head" id="opixHead"><span>Operating picture</span><span>Thermal · WebRTC</span>
        <span class="live"><i></i><span id="feedState">Feed offline</span></span></div>
      <div class="opix" id="opix">
        <video id="feed" autoplay muted playsinline></video>
        <div class="hud tl" id="hudTl">DFR // ${incident ? incident.ref : 'STANDBY'}</div>
        <div class="hud bl">NO FACIAL RECOGNITION · OVERWATCH ONLY</div>
        <div class="veil" id="veil"><div class="vt">Awaiting callout</div>
          <div class="vb">Open a callout to bind the feed and start the record. Nothing is captured without an incident.</div></div>
      </div>
      <div class="incident">
        <div class="icell"><div class="k">Incident</div><div class="v" id="iRef">—</div></div>
        <div class="icell"><div class="k">Type</div><div class="v" id="iType">—</div></div>
        <div class="icell"><div class="k">Location</div><div class="v" id="iLoc">—</div></div>
        <div class="icell"><div class="k">Status</div><div class="v" id="iStatus">—</div></div>
      </div>
      <div class="controls">
        <button class="btn primary" id="bCall" ${canOpen ? '' : 'disabled'}>New callout</button>
        <button class="btn auth" id="bAuth" disabled>Authorise flight</button>
        <button class="btn" id="bFlag" disabled>Flag hazard</button>
        <button class="btn" id="bSeal" disabled>Seal &amp; close</button>
        <button class="btn" id="bFeed">Connect feed</button>
        <button class="btn" id="bVerify" disabled title="Recompute the whole chain server-side">Verify record</button>
      </div>
    </div>
    <div class="col">
      <div class="col-head on"><span>Governance</span></div>
      <div class="gov">
        <div class="r"><b>Your role</b><span class="val ${canWrite ? 'ok' : ''}">${profile.role}</span></div>
        <div class="r"><b>Lawful basis</b><span class="val">public task · DPA 2018</span></div>
        <div class="r"><b>Facial recognition</b><span class="val">not integrated</span></div>
        <div class="r"><b>Retention</b><span class="val" id="gRet">—</span></div>
        <div class="r"><b>Record</b><span class="val ok" id="gRec">server-signed</span></div>
      </div>
      <div class="col-head on" style="border-top:none"><span>Overwatch ledger</span><span>SHA-256 · HMAC</span>
        <span class="live"><i></i><span id="ledState">tamper-evident</span></span></div>
      <div class="ledger" id="ledger"><div class="empty" id="ledEmpty">AUDIT LEDGER · <span style="color:var(--accent)">ARMED</span><br>
        Every authorise, flag and seal is signed server-side and hash-chained.<br>Open a callout to begin.</div></div>
      <div class="verdict ok" id="verdict" style="display:none"></div>
    </div>
  </div>
  <p class="note" style="margin-top:16px">${canOpen ? '' : '⚠️ You are <b>' + profile.role + '</b> — opening a callout needs a <b>commander</b> role. See README step 6.'}</p>`;

  bindFeedEl();
  document.getElementById('bCall').onclick = newCallout;
  document.getElementById('bAuth').onclick = () => append('FLIGHT AUTHORISED', { note: 'Necessity + proportionality recorded · overt' }, { gate: true, then: 'airborne' });
  document.getElementById('bFlag').onclick = () => append('HAZARD FLAGGED', { hazard: 'Gas cylinder detected', to: 'Incident Commander' }, {});
  document.getElementById('bSeal').onclick = () => append('RECORD SEALED', { retention_days: 31, disclosure: 'pack ready' }, { gate: true, seals: true, then: 'sealed' });
  document.getElementById('bFeed').onclick = connectFeed;
  document.getElementById('bVerify').onclick = runVerify;
  if (incident) loadIncidentUI();
}

function setControls(s) {
  const g = id => document.getElementById(id);
  const canOpen = ['commander', 'admin'].includes(profile.role);
  g('bCall').disabled = !canOpen || s === 'airborne';
  g('bAuth').disabled = s !== 'open';
  g('bFlag').disabled = s !== 'airborne';
  g('bSeal').disabled = s !== 'airborne';
  g('bVerify').disabled = !incident;
}

async function newCallout() {
  const types = ['Structure fire — commercial', 'Structure fire — residential', 'Fire — persons reported', 'Vehicle fire — carriageway', 'Industrial — hazmat risk'];
  const locs = ['Unit 7, Riverside Estate', 'Maple Court, Elm Ward', 'Kiln Road, Northgate', 'A-road, Jct 12 EB', 'Gasworks Lane depot'];
  const i = Math.floor((Date.now() / 1000) % types.length);
  try {
    const { incident: inc } = await fn('incident-open', { type: types[i], location: locs[i] });
    incident = inc; verify = { sealed: true, brokenAt: null };
    toast(`Callout opened · ${inc.ref}`);
    loadIncidentUI(); await loadLedger();
  } catch (e) { toast(e.message, true); }
}

async function append(event, meta, { gate = false, seals = false, then = null } = {}) {
  if (!incident) return;
  try {
    await fn('ledger-append', { incidentId: incident.id, event, meta, gate, sealsIncident: seals });
    if (then) { incident.status = then; document.getElementById('iStatus').textContent = then; }
    if (seals) { document.getElementById('gRet').textContent = '31 days · auto-delete'; }
    setControls(incident.status);
    await loadLedger();
    toast(event + ' · recorded');
  } catch (e) { toast(e.message, true); }
}

function loadIncidentUI() {
  const g = id => document.getElementById(id);
  g('iRef').textContent = incident.ref; g('iType').textContent = incident.type;
  g('iLoc').textContent = incident.location || '—'; g('iStatus').textContent = incident.status;
  g('hudTl').textContent = 'DFR // ' + incident.ref;
  setControls(incident.status);
}

async function loadLedger() {
  if (!incident) return;
  const { data: rows } = await sb.from('overwatch_events')
    .select('seq, ts, event, meta, actor, gate, chain_hash').eq('incident_id', incident.id).order('seq');
  const box = document.getElementById('ledger');
  if (!rows || !rows.length) return;
  box.innerHTML = rows.map(r => {
    const broken = verify.brokenAt && r.seq >= verify.brokenAt;
    const t = (r.ts || '').slice(11, 19);
    const meta = Object.entries(r.meta || {}).map(([k, v]) => `${k}: ${v}`).join(' · ');
    const short = r.chain_hash.slice(0, 8) + '…' + r.chain_hash.slice(-3);
    return `<div class="lrow${broken ? ' broken' : ''}"><span class="s">#${String(r.seq).padStart(2, '0')}</span>
      <span class="t">${t}</span><span class="e">${r.gate ? '<span class="g">◆ HUMAN AUTHORISE</span>' : ''}
      <b>${esc(r.event)}</b>${meta ? `<span class="m">${esc(meta)}</span>` : ''}<span class="m" style="color:var(--faint)">${esc(r.actor)}</span></span>
      <span class="h">🔒 ${short}</span></div>`;
  }).join('');
}

async function runVerify() {
  try {
    verify = await fn('ledger-verify', { incidentId: incident.id });
    const v = document.getElementById('verdict');
    v.style.display = 'block';
    if (verify.sealed) { v.className = 'verdict ok'; v.textContent = `✓ CHAIN VERIFIED · ${verify.count} events · SEALED · TAMPER-EVIDENT`; document.getElementById('ledState').textContent = 'tamper-evident'; }
    else { v.className = 'verdict bad'; v.textContent = `⚠ CHAIN BROKEN AT #${String(verify.brokenAt).padStart(2, '0')} · ${verify.reason}`; document.getElementById('ledState').textContent = 'COMPROMISED'; }
    await loadLedger();
  } catch (e) { toast(e.message, true); }
}

/* ---- WebRTC (WHEP) thermal feed ---- */
let feedVideo, pc;
function bindFeedEl() { feedVideo = document.getElementById('feed'); }
async function connectFeed() {
  try {
    if (pc) { pc.close(); pc = null; }
    pc = new RTCPeerConnection();
    pc.addTransceiver('video', { direction: 'recvonly' });
    pc.ontrack = (ev) => { feedVideo.srcObject = ev.streams[0]; document.getElementById('opix').classList.add('live'); document.getElementById('feedState').textContent = 'Thermal live'; document.getElementById('opixHead').classList.add('on'); feedPill.classList.add('on'); feedPillT.textContent = 'Feed live'; };
    const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
    const res = await fetch(CONFIG.FEED_WHEP, { method: 'POST', headers: { 'Content-Type': 'application/sdp' }, body: offer.sdp });
    if (!res.ok) throw new Error('WHEP ' + res.status + ' — is MediaMTX running with a /thermal feed?');
    const answer = await res.text(); await pc.setRemoteDescription({ type: 'answer', sdp: answer });
    if (incident) await append('RECORDING STARTED', { source: 'thermal', retention: '31 days', facial_recognition: 'none' }, {});
  } catch (e) { toast(e.message, true); }
}

function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
</script>
</body>
</html>
